version: "3.9"

services:
  mlflow:
    image: python:3.11-slim
    container_name: tricura-mlflow
    working_dir: /app
    volumes:
      - ../:/app
      - ./mlflow:/mlflow
    command: >
      bash -lc "pip install --no-cache-dir mlflow &&
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000"
    ports:
      - "5000:5000"
    restart: unless-stopped
